services:
  - type: web
    name: greenmetric-backend
    env: docker
    region: frankfurt
    plan: free
    dockerCommand: |
      php artisan migrate --force
      apache2-foreground
    envVars:
      - key: APP_NAME
        value: GreenMetric
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_LOCALE
        value: en
      - key: APP_FALLBACK_LOCALE
        value: en
      - key: BCRYPT_ROUNDS
        value: 12
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: greenmetric-db
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        fromDatabase:
          name: greenmetric-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: greenmetric-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: greenmetric-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: 120
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: log
      - key: VITE_APP_NAME
        value: GreenMetric

databases:
  - name: greenmetric-db
    databaseName: greenmetric
    plan: free
