services:
  - type: web
    name: elios-backend
    env: php
    region: frankfurt
    plan: free
    buildCommand: |
      cp .env.production .env
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: |
      cp .env.production .env
      php artisan migrate --force
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: Elios
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_LOCALE
        value: en
      - key: APP_FALLBACK_LOCALE
        value: en
      - key: BCRYPT_ROUNDS
        value: 12
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: elios-db
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        fromDatabase:
          name: elios-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: elios-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: elios-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: 120
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: log
      - key: VITE_APP_NAME
        value: Elios

databases:
  - name: elios-db
    databaseName: elios
    plan: free
